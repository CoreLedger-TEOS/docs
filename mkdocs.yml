site_name: TEOS Documentation
site_url: https://docs-fvapcccpf5fjdnc8.a02.azurefd.net/teos/
repo_url: https://github.com/CoreLedger-TEOS/docs
repo_name: CoreLedger-TEOS/docs
edit_uri: edit/mkdocs-migration/content/
use_directory_urls: false

docs_dir: content
site_dir: .site

theme:
  name: material
  logo: assets/CoreLedger_Logo_Normal_RGB_horizontal.png
  favicon: assets/CoreLedger_Logo_Normal_RGB_horizontal.png
  features:
    - navigation.instant
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/coreledger-docs.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - markdown.extensions.fenced_code
  - md_in_html
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

exclude_docs: |
  .site/
  admin/config.yml
  /SUMMARY.md
  /faq.md
  /get-started.md
  /trooubleshooting.md
  /changelog/
  /overview/
  /reference/
  /using-additional-apis-of-teos-platform/
  /using-the-teos-api/
  teos-api/SUMMARY.md
  teos-api/overview/supply-management.md
  teos-api/overview/warp-search.md
  teos-api/overview/dealing-with-blockchain-transactions/

