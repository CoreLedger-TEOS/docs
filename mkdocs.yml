site_name: TEOS Documentation
site_url: https://docs-fvapcccpf5fjdnc8.a02.azurefd.net/teos/
repo_url: https://github.com/CoreLedger-TEOS/docs
repo_name: CoreLedger-TEOS/docs
edit_uri: edit/mkdocs-migration/content/
use_directory_urls: false

docs_dir: content
site_dir: .site

theme:
  name: material
  logo: assets/CoreLedger_Logo_Normal_RGB_horizontal.png
  favicon: assets/CoreLedger_Logo_Normal_RGB_horizontal.png
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

exclude_docs: |
  .site/
  admin/config.yml

nav:
  - Welcome: README.md
  - Where to start:
      - Overview: where-to-start/README.md
      - Create TEOS account: where-to-start/step-1-create-teos-account.md
      - Register WLM profile: where-to-start/step-2-register-profile-in-wlm.md
      - Install TX.Mobile: where-to-start/step-3-install-and-register-in-tx.mobile.md
      - Set up wallet: where-to-start/step-4-setup-a-wallet-wlm-+-tx.mobile.md
      - Start using WLM: where-to-start/step-5-start-using-wlm.md
  - WLM versions:
      - Overview: wlm-versions-and-changelog/README.md
      - Gecko: wlm-versions-and-changelog/gecko.md
      - Fox Service Packs: wlm-versions-and-changelog/fox-service-packs.md
      - Fox: wlm-versions-and-changelog/fox.md
      - Estrella Service Packs: wlm-versions-and-changelog/estrella-service-packs.md
      - Estrella: wlm-versions-and-changelog/estrella.md
      - Previous versions: wlm-versions-and-changelog/previous-versions-changelog.md
  - Admin user guide:
      - Overview: admin-user-guide/README.md
      - WLM configuration:
          - Overview: admin-user-guide/wlm-configuration/README.md
          - Branding: admin-user-guide/wlm-configuration/branding-management.md
          - Templates: admin-user-guide/wlm-configuration/templates-management.md
          - Constraints: admin-user-guide/wlm-configuration/constraints-management.md
      - TEOS platform setup: admin-user-guide/teos-platform-preparation.md
      - User management: admin-user-guide/user-management.md
      - Referral management: admin-user-guide/referral-management.md
      - Role management: admin-user-guide/role-management.md
      - Transfer tokens: admin-user-guide/how-to-transfer-tokens-to-the-external-wallet.md
  - User guide:
      - Overview: user-guide/README.md
      - Create asset: user-guide/create-asset.md
      - Asset management:
          - Overview: user-guide/manage-asset-asset-details-asset-operations/README.md
          - Create units: user-guide/manage-asset-asset-details-asset-operations/create-units.md
          - Transfer units: user-guide/manage-asset-asset-details-asset-operations/transfer-units.md
          - Destroy units: user-guide/manage-asset-asset-details-asset-operations/destroy-units.md
          - Amend asset: user-guide/manage-asset-asset-details-asset-operations/amend-asset-edit-translations.md
          - Link assets: user-guide/manage-asset-asset-details-asset-operations/link-assets.md
          - FT & NFT contracts: user-guide/manage-asset-asset-details-asset-operations/ft-and-nft-contracts.md
      - Search, buy, sell: user-guide/search-buy-sell-asset.md
      - Transactions: user-guide/sign-and-check-executed-transactions.md
      - Wallet management:
          - Overview: user-guide/wallet-management-in-wlm-+-tx.mobile/README.md
          - Add external wallets: user-guide/wallet-management-in-wlm-+-tx.mobile/add-external-wallets-tx.mobile.md
          - Restore device data: user-guide/wallet-management-in-wlm-+-tx.mobile/restore-data-from-your-another-device-tx.mobile.md
      - Controllers: user-guide/controller-management.md
      - Additional settings: user-guide/additional-settings-management.md
      - Supply management: user-guide/supply-management.md
      - Profile settings: user-guide/profile-settings.md
      - Support: user-guide/support.md
  - Troubleshooting: troubleshooting.md
  - Glossary: glossary.md
