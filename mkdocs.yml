site_name: TEOS Documentation
site_url: https://docs-fvapcccpf5fjdnc8.a02.azurefd.net/teos/
repo_url: https://github.com/CoreLedger-TEOS/docs
repo_name: CoreLedger-TEOS/docs
edit_uri: edit/mkdocs-migration/content/
use_directory_urls: false

docs_dir: content
site_dir: .site

theme:
  name: material
  logo: assets/CoreLedger_Logo_Normal_RGB_horizontal.png
  favicon: assets/CoreLedger_Logo_Normal_RGB_horizontal.png
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

exclude_docs: |
  .site/
  admin/config.yml

nav:
  - Welcome: README.md
  - Platform overview:
      - Overview: overview/README.md
      - Rate limits: overview/rate-limits.md
      - Supply management: overview/supply-management.md
      - TEOS events: overview/teos-events.md
      - Warp search: overview/warp-search.md
      - Blockchain transactions:
          - Overview: overview/dealing-with-blockchain-transactions/README.md
          - Get Ether: overview/dealing-with-blockchain-transactions/how-to-get-ether-for-signing-transactions.md
